# Recorded gateway routing baseline, used by the bench-regress smoke gate.
#
# overhead.ratio is the facade's median latency overhead over a direct backend
# call, measured in the same run so the comparison is hardware independent. The
# gate fails if a run's measured overhead ratio exceeds this baseline by more
# than regress.tolerance, which catches a routing change that adds latency
# without making the gate sensitive to machine speed.
#
# Measured locally over three runs (5000 requests, 1000 warmup): median overhead
# 46%, 51%, 60%; direct median around 660 us, gateway median around 1000 us. The
# baseline below sits at the centre of that range.
overhead.ratio=0.55
regress.tolerance=0.30
