name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Spotless and checkstyle
        run: mvn -B spotless:check checkstyle:check

  build-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build and verify with coverage gate
        run: mvn -B verify

  e2e:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Package services
        run: mvn -B -DskipTests package
      - name: Start topology
        run: docker compose up -d --build
      - name: Wait for gateway to serve the domain
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/rooms >/dev/null 2>&1; then
              echo "gateway serving the domain"
              exit 0
            fi
            sleep 5
          done
          docker compose logs
          exit 1
      - name: Gateway serves the domain end to end
        run: ./scripts/e2e-smoke.sh
      - name: Tear down
        if: always()
        run: docker compose down -v

  bench-regress:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Install modules for the benchmark
        run: mvn -B -DskipTests install
      - name: Gateway routing overhead smoke gate
        run: mvn -B -pl benchmark -Pbench test
      - name: Show report
        if: always()
        run: cat benchmark/target/benchmark-report.md || true

  build-images:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Package services
        run: mvn -B -DskipTests package
      - name: Build images
        run: |
          docker build -t cloudshift/monolith:ci ./monolith
          docker build -t cloudshift/reservation-service:ci ./reservation-service
          docker build -t cloudshift/gateway:ci ./gateway
